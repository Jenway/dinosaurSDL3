name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          cache: true

      - name: Build native executable
        run: pixi run build

      - name: Run gameplay tests
        run: pixi run test

      - name: Build web bundle
        run: pixi run build-web

      - name: Package release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $nativeDir = 'dist/native'
          $webDir = 'dist/web'

          New-Item -ItemType Directory -Force -Path "$nativeDir/Resources" | Out-Null
          New-Item -ItemType Directory -Force -Path $webDir | Out-Null

          Copy-Item -LiteralPath 'build/dinosaur.exe' -Destination "$nativeDir/dinosaur.exe" -Force
          Copy-Item -LiteralPath 'build/SDL3.dll' -Destination "$nativeDir/SDL3.dll" -Force
          Copy-Item -LiteralPath 'Resources/dino.png' -Destination "$nativeDir/Resources/dino.png" -Force
          Copy-Item -LiteralPath 'README.md' -Destination "$nativeDir/README.md" -Force
          Copy-Item -LiteralPath 'LICENSE' -Destination "$nativeDir/LICENSE" -Force

          Copy-Item -LiteralPath 'build-web/dinosaur.html' -Destination "$webDir/dinosaur.html" -Force
          Copy-Item -LiteralPath 'build-web/dinosaur.js' -Destination "$webDir/dinosaur.js" -Force
          Copy-Item -LiteralPath 'build-web/dinosaur.wasm' -Destination "$webDir/dinosaur.wasm" -Force
          Copy-Item -LiteralPath 'build-web/dinosaur.data' -Destination "$webDir/dinosaur.data" -Force

          Compress-Archive -Path "$nativeDir/*" -DestinationPath 'dist/dinosaur-native.zip' -Force
          Compress-Archive -Path "$webDir/*" -DestinationPath 'dist/dinosaur-web.zip' -Force

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            dist/dinosaur-native.zip `
            dist/dinosaur-web.zip `
            --verify-tag `
            --generate-notes `
            --title "Dino C ${{ github.ref_name }}"
